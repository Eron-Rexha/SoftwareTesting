<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CareerStream | Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">
    <div class="bg-white p-10 rounded-3xl shadow-sm w-full max-w-md">
        <h1 class="text-3xl font-bold tracking-tighter mb-2">JOIN CAREERSTREAM</h1>
        <p class="text-gray-500 mb-8">Create your talent profile.</p>
        
        <form id="registerForm" class="space-y-4">
            <input type="text" id="regUser" placeholder="Username" class="w-full border-b py-3 outline-none focus:border-black" required>
            <input type="email" id="regEmail" placeholder="Email" class="w-full border-b py-3 outline-none focus:border-black" required>
            <input type="password" id="regPass" placeholder="Password" class="w-full border-b py-3 outline-none focus:border-black" required>
            <button type="submit" class="w-full bg-black text-white py-4 rounded-2xl font-bold mt-4 hover:bg-gray-800 transition">CREATE ACCOUNT</button>
        </form>
        <p class="mt-6 text-sm text-center text-gray-500">
            Already have an account? <a href="/signin" class="text-black font-bold underline">Login</a>
        </p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const data = {
        username: document.getElementById('regUser').value,
        email: document.getElementById('regEmail').value,
        password: document.getElementById('regPass').value
    };
    
    const res = await fetch('/register', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });

    const result = await res.json();

    if(res.ok) {
        alert("Account created!");
        window.location.href = "/signin";
    } else {
        // This will now show you if the password is too short or email is invalid
        let errorMsg = result.detail[0]?.msg || "Registration failed";
        alert("Validation Error: " + errorMsg);
    }
});
    </script>
</body>
</html>
