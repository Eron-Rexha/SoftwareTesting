<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerStream | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfc; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid #eee; }
    </style>
</head>
<body class="max-w-5xl mx-auto px-6 py-12">

    <header class="flex justify-between items-center mb-12">
        <div>
            <h1 class="text-2xl font-bold tracking-tighter">CAREERSTREAM</h1>
            <p class="text-xs text-gray-400 uppercase tracking-widest">Opportunity Management System</p>
        </div>
        <nav class="flex items-center space-x-6">
            <a href="/" class="text-sm font-bold border-b-2 border-black">Home</a>
            <a href="/signup" class="text-sm font-medium text-gray-500 hover:text-black">Register</a>
            <a href="/signin" class="text-sm font-medium text-gray-500 hover:text-black">Login</a>
            <div id="statusIndicator" class="flex items-center text-xs font-semibold text-green-500 uppercase ml-4">
                <span class="relative flex h-2 w-2 mr-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                </span>
                API Online
            </div>
        </nav>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-12 pt-12">
        <div class="lg:col-span-1">
            <div class="glass-card p-6 rounded-2xl sticky top-8">
                <h2 class="text-lg font-semibold mb-6">Post an Opening</h2>
                <form id="jobForm" class="space-y-4">
                    <input type="text" id="title" placeholder="Position Title" class="w-full border-b py-2 outline-none focus:border-black transition" required>
                    <input type="text" id="location" placeholder="Location" class="w-full border-b py-2 outline-none focus:border-black transition" required>
                    <input type="text" id="salary" placeholder="Salary Range" class="w-full border-b py-2 outline-none focus:border-black transition" required>
                    <textarea id="description" placeholder="Description" class="w-full border-b py-2 outline-none focus:border-black transition h-20" required></textarea>
                    <textarea id="requirements" placeholder="Requirements" class="w-full border-b py-2 outline-none focus:border-black transition h-20" required></textarea>
                    <button type="submit" class="w-full bg-black text-white py-3 rounded-xl font-medium hover:bg-gray-800 transition">Publish Job</button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-2">
            <h2 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-8">Live Feed</h2>
            <div id="jobList" class="space-y-6">
                <p class="text-gray-400 animate-pulse">Connecting to backend...</p>
            </div>
        </div>
    </div>

    <div id="applyModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-2xl max-w-md w-full shadow-2xl">
            <h2 id="modalJobTitle" class="text-xl font-bold mb-2">Apply</h2>
            <textarea id="coverLetter" placeholder="Why are you a good fit?" class="w-full border p-3 rounded-xl h-32 mb-4 outline-none focus:ring-1 focus:ring-black"></textarea>
            <div class="flex space-x-3">
                <button onclick="closeModal()" class="flex-1 py-2 text-sm font-medium text-gray-500">Cancel</button>
                <button id="submitAppBtn" class="flex-1 bg-black text-white py-2 rounded-lg text-sm font-medium">Submit</button>
            </div>
        </div>
    </div>

    <script>
        let currentJobId = null;

        function getAccessToken() {
            return localStorage.getItem('access_token');
        }

        function getAuthHeaders(includeJson = false) {
            const headers = {};
            const token = getAccessToken();

            if (includeJson) {
                headers["Content-Type"] = "application/json";
            }

            if (token) {
                headers["Authorization"] = `Bearer ${token}`;
            }

            return headers;
        }

        function updateAuthUi() {
            const token = getAccessToken();
            const status = document.getElementById("statusIndicator");

            if (token) {
                status.innerHTML = `
                    <span class="relative flex h-2 w-2 mr-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                    </span>
                    Logged In
                `;
                status.className = "flex items-center text-xs font-semibold text-green-500 uppercase ml-4";
            } else {
                status.innerHTML = `
                    <span class="relative flex h-2 w-2 mr-2">
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-amber-500"></span>
                    </span>
                    Login Required
                `;
                status.className = "flex items-center text-xs font-semibold text-amber-600 uppercase ml-4";
            }
        }

        async function loadJobs() {
            try {
                const res = await fetch("/jobs");
                const jobs = await res.json();
                const container = document.getElementById("jobList");
                const isLoggedIn = !!getAccessToken();

                if (jobs.length === 0) {
                    container.innerHTML = '<p class="text-gray-400 italic">No job openings yet.</p>';
                    return;
                }

                container.innerHTML = jobs.map(job => `
                    <div class="bg-white border border-gray-100 p-6 rounded-2xl hover:shadow-md transition">
                        <div class="flex justify-between items-start gap-4">
                            <div>
                                <h3 class="text-xl font-bold">${job.title}</h3>
                                <p class="text-sm text-gray-500">${job.location} - ${job.salary}</p>
                            </div>
                            <div class="flex items-center gap-2">
                                <button onclick="openApplyModal(${job.id}, '${job.title.replace(/'/g, "\\'")}')" class="bg-gray-100 text-black px-4 py-2 rounded-lg text-xs font-bold hover:bg-black hover:text-white transition">Apply Now</button>
                                ${isLoggedIn ? `<button onclick="deleteJob(${job.id})" class="bg-red-50 text-red-600 px-4 py-2 rounded-lg text-xs font-bold hover:bg-red-600 hover:text-white transition">Remove</button>` : ""}
                            </div>
                        </div>
                    </div>
                `).join("");
            } catch (err) {
                console.error("Failed to load jobs:", err);
            }
        }

        async function deleteJob(jobId) {
            if (!getAccessToken()) {
                alert("Please log in before removing a job.");
                return;
            }

            if (!confirm("Remove this job from the page?")) {
                return;
            }

            const response = await fetch(`/jobs/${jobId}`, {
                method: "DELETE",
                headers: getAuthHeaders()
            });

            if (response.ok) {
                loadJobs();
                return;
            }

            const errorData = await response.json().catch(() => ({}));
            if (response.status === 401) {
                alert("Please log in before removing a job.");
            } else {
                alert("Could not remove job: " + (errorData.detail || "Unknown error"));
            }
        }

        document.getElementById("jobForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const data = {
                title: document.getElementById("title").value,
                location: document.getElementById("location").value,
                salary: document.getElementById("salary").value,
                description: document.getElementById("description").value,
                requirements: document.getElementById("requirements").value,
                is_active: 1
            };

            const res = await fetch("/jobs", {
                method: "POST",
                headers: getAuthHeaders(true),
                body: JSON.stringify(data)
            });

            if (res.ok) {
                e.target.reset();
                loadJobs();
            } else {
                const errorData = await res.json().catch(() => ({}));
                if (res.status === 401) {
                    alert("Please log in before posting a job.");
                } else {
                    alert("Error posting job: " + (errorData.detail || "Unknown error"));
                }
            }
        });

        function openApplyModal(id, title) {
            currentJobId = id;
            document.getElementById("modalJobTitle").innerText = title;
            document.getElementById("applyModal").classList.remove("hidden");
        }

        function closeModal() {
            document.getElementById("applyModal").classList.add("hidden");
            document.getElementById("coverLetter").value = "";
        }

        async function submitApplication() {
            const coverLetterText = document.getElementById("coverLetter").value;

            if (!coverLetterText) {
                alert("Please write a cover letter.");
                return;
            }

            if (!getAccessToken()) {
                alert("Please log in before applying to a job.");
                return;
            }

            try {
                const response = await fetch(`/jobs/${currentJobId}/apply`, {
                    method: "POST",
                    headers: getAuthHeaders(true),
                    body: JSON.stringify({
                        cover_letter: coverLetterText
                    })
                });

                if (response.ok) {
                    alert("Application sent successfully!");
                    closeModal();
                } else {
                    const errorData = await response.json();
                    alert("Failed: " + JSON.stringify(errorData.detail));
                }
            } catch (error) {
                alert("Connection error.");
            }
        }

        document.getElementById("submitAppBtn").addEventListener("click", submitApplication);

        updateAuthUi();
        loadJobs();
    </script>
</body>
</html>
