<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CareerStream | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center h-screen">
    <div class="bg-white p-10 rounded-3xl shadow-sm w-full max-w-md">
        <h1 class="text-3xl font-bold tracking-tighter mb-2">WELCOME BACK</h1>
        <p class="text-gray-500 mb-8">Sign in to manage opportunities.</p>
        
        <form id="loginForm" class="space-y-4">
            <input type="text" id="logUser" placeholder="Username" class="w-full border-b py-3 outline-none focus:border-black" required>
            <input type="password" id="logPass" placeholder="Password" class="w-full border-b py-3 outline-none focus:border-black" required>
            <button type="submit" class="w-full bg-black text-white py-4 rounded-2xl font-bold mt-4 hover:bg-gray-800 transition">SIGN IN</button>
        </form>
        <p class="mt-6 text-sm text-center text-gray-500">
            Need an account? <a href="/signup" class="text-black font-bold underline">Register</a>
        </p>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // OAuth2PasswordRequestForm expects "username" and "password" as form fields
        const formData = new FormData();
        formData.append('username', document.getElementById('logUser').value);
        formData.append('password', document.getElementById('logPass').value);

        try {
            const res = await fetch('/token', {
                method: 'POST',
                body: formData // Note: No headers needed for FormData, fetch adds them
            });

            const result = await res.json();

            if (res.ok) {
                // Save the token to local storage so the browser "remembers" you
                localStorage.setItem('access_token', result.access_token);
                
                alert("Login successful! Redirecting...");
                window.location.href = "/"; 
            } else {
                // If the backend returns an error (like 401 Unauthorized)
                alert("Login failed: " + (result.detail || "Invalid credentials"));
            }
        } catch (err) {
            console.error("Fetch error:", err);
            alert("Could not connect to the server. Check your terminal.");
        }
    });
</script>
</body>
</html>
